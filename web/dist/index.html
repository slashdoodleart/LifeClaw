<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f14; --surface: #1a1a24; --border: #2a2a3a;
      --text: #e8e8f0; --muted: #6b6b80; --primary: #f97316;
      --accent: #a855f7; --secondary: #6366f1; --success: #22c55e;
      --error: #ef4444;
    }
    body { font-family: -apple-system, 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; color: var(--primary); font-weight: 700; }
    header .status { font-size: 12px; color: var(--muted); }
    header .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    header .dot.connected { background: var(--success); }
    header .dot.disconnected { background: var(--error); }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .message.user { align-self: flex-end; background: var(--secondary); color: white; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message.system { align-self: center; color: var(--muted); font-size: 12px; background: none; }
    .message code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .message pre { background: #12121a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
    .message pre code { background: none; padding: 0; }
    #input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    #input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; resize: none; min-height: 44px; max-height: 200px; }
    #input:focus { border-color: var(--primary); }
    #input::placeholder { color: var(--muted); }
    #send { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #send:hover { opacity: 0.9; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    .typing { color: var(--muted); font-style: italic; font-size: 13px; padding: 8px 16px; }
    footer { padding: 8px 24px; text-align: center; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <header>
    <h1>LifeClaw</h1>
    <span class="dot" id="status-dot"></span>
    <span class="status" id="status-text">Connecting...</span>
  </header>

  <div id="chat">
    <div class="message system">Welcome to LifeClaw Web Dashboard. Type a message to start.</div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <footer>LifeClaw — Terminal + Web + Chat Apps</footer>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    let ws = null;
    let connected = false;

    function connect() {
      const wsPort = location.port ? parseInt(location.port) - 1 : 3119;
      const wsUrl = `ws://${location.hostname}:${wsPort}`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        connected = true;
        statusDot.className = 'dot connected';
        statusText.textContent = 'Connected';
      };

      ws.onclose = () => {
        connected = false;
        statusDot.className = 'dot disconnected';
        statusText.textContent = 'Disconnected — reconnecting...';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        statusDot.className = 'dot disconnected';
        statusText.textContent = 'Connection error';
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'response') {
            removeTyping();
            addMessage('assistant', msg.content);
            sendBtn.disabled = false;
          } else if (msg.type === 'stream') {
            removeTyping();
            appendToLast(msg.content);
          } else if (msg.type === 'init') {
            statusText.textContent = `Connected — ${msg.data.model || 'unknown model'}`;
          }
        } catch (e) {
          console.error('Parse error:', e);
        }
      };
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      // Basic markdown: bold, code blocks, inline code
      let html = escapeHtml(content);
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function appendToLast(content) {
      const messages = chat.querySelectorAll('.message.assistant');
      if (messages.length > 0) {
        const last = messages[messages.length - 1];
        last.textContent += content;
      } else {
        addMessage('assistant', content);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.textContent = 'Thinking...';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function send() {
      const text = input.value.trim();
      if (!text || !connected) return;
      addMessage('user', text);
      ws.send(JSON.stringify({ type: 'chat', content: text }));
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      addTyping();
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    });

    connect();
  </script>
</body>
</html>
